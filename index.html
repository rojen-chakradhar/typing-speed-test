<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  </head>
  <body>
    <div class="page">
      <div class="app-shell">
        <header class="topbar">
          <a href="./index.html" class="brand">
            <span class="brand-badge">TRACK SPEED</span>
            <h1>Typing Speed Test</h1>
          </a>
          <div class="top-actions">
            <div class="best-score" id="bestScore" title="Your best WPM">Best WPM: 0</div>
          </div>
        </header>
        <nav class="controls">git add .
          <div class="timer-btns btns-wrapper">
            <p class="btns-label">Time:</p>
            <div class="mode-buttons">
              <button class="mode-btn timer active" data-time="15" title="15 sec">15</button>
              <button class="mode-btn timer" data-time="30" title="30 sec">30</button>
              <button class="mode-btn timer" data-time="60" title="60 sec">60</button>
            </div>
          </div>
          <div class="diff-btns btns-wrapper">
            <p class="btns-label">Difficulty:</p>
            <div class="mode-buttons">
              <button class="mode-btn" data-diff="easy" title="easy">Easy</button>
              <button class="mode-btn active" data-diff="medium" title="medium">Medium</button>
              <button class="mode-btn" data-diff="hard" title="hard">hard</button>
            </div>
          </div>
          <div class="action-btns btns-wrapper">
            <div class="action-buttons">
              <button class="primary-btn action-btn" id="startBtn" title="play"><i class="ri-play-line"></i></button>
              <button class="secondary-btn action-btn" id="restartBtn" title="restart"><i class="ri-restart-line"></i></button>
            </div>
          </div>
        </nav>
        <main class="layout">
          <section class="controls-panel">
            <div class="stats-grid">
              <div class="stat-card">
                <span class="stat-label">Time Left</span>
                <strong class="stat-value" id="time">15</strong>
              </div>
              <div class="stat-card">
                <span class="stat-label">WPM</span>
                <strong class="stat-value" id="wpm">0</strong>
              </div>
              <div class="stat-card">
                <span class="stat-label">Accuracy</span>
                <strong class="stat-value" id="accuracy">0%</strong>
              </div>
              <div class="stat-card">
                <span class="stat-label">Mistakes</span>
                <strong class="stat-value" id="mistakes">0</strong>
              </div>
            </div>
          </section>
          <section class="panel typing-panel">
            <div class="typing-test" id="typingText"></div>
            <textarea id="inputField" placeholder="Press start to start the test" spellcheck="false" disabled></textarea>
          </section>
        </main>
      </div>
    </div>
    <div class="result-overlay" id="resultOverlay">
      <div class="result-card">
        <div class="result-head">
          <span class="brand-badge">RESULT</span>
          <h2>Test Completed</h2>
          <p>Your final performance spanshot.</p>
        </div>
        <div class="result-grid">
          <div class="result-item">
            <span class="stat-label">Final WPM</span>
            <strong class="stat-value" id="finalWpm">0</strong>
          </div>
          <div class="result-item">
            <span class="stat-label">Accuracy</span>
            <strong class="stat-value" id="finalAccuracy">0</strong>
          </div>
          <div class="result-item">
            <span class="stat-label">Mistakes</span>
            <strong class="stat-value" id="finalMistakes">0</strong>
          </div>
          <div class="result-item">
            <span class="stat-label">Best WPM</span>
            <strong class="stat-value" id="finalBest">0</strong>
          </div>
        </div>
        <div class="result-btns">
          <button class="secondary-btn result-btn" id="closeResultBtn">Close</button>
          <button class="primary-btn result-btn" id="reTryResultBtn">Try Again</button>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
